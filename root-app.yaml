apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    # 👇 CHANGE THIS to YOUR git repo URL
    repoURL: https://github.com/YOUR_USERNAME/app-of-app-test.git
    targetRevision: HEAD
    # This is the "app of apps" magic: point at a folder full of Application manifests.
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true      # delete resources removed from git
      selfHeal: true   # revert manual changes back to git state
